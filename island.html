<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insulă - isla.fun</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header id="header"></header>

<section id="island-page">
    <div id="island-meta">
        <a  href="index.html" class="btn ghost">←Ocean</a>
        <span id="island-name">se încarcă...</span>
        <span id="island-owner"></span>
        <button id="heart-btn" class="heart-btn">❤️ <span id="heart-count">0</span></button>
    </div>

    <div id="island-canvas"></div>

    <div id="palette" style="display:none"></div>

    <div id="island-actions"></div>
    <div class="hint" id="island-hint"></div>
</section>

<script src="app.js"></script>
<script>
const { Store, PALETTE, renderHeader, el} = window.IslaApp;

const params = new URLSearchParams(location.search);
const islandId = params.get('id');

let profile = null;
let island = null;
let isOwner = false;
let editing = false;
let decorations = [];

async function init() {
    if (!islandId) { location.href = 'index.html'; return; }
    profile = await Store.getProfile();
    await renderHeader(profile);
    island = await Store.getIsland(islandId);
    if (!island) { document.getElementById('island-name').textContent = 'Insulă inexistentă'; return; }
    isOwner = profile && profile.id === island.owner_id;
    decorations = [...island.decorations];
    render();
}

function render() {
    document.getElementById('island-name').textContent = island.name;
    document.getElementById('island-owner').textContent = isOwner ? '(insula ta)' : `de @${island.owner_username}`;
    document.getElementById('heart-count').textContent = island.hearts_count;
    const heartBtn = document.getElementById('heart-btn');
    heartBtn.classList.toggle('liked', island.liked_by_me);
    heartBtn.onclick = onHeart;
    renderDecorations();
    renderActions();
    renderHint();
}

function renderDecorations() {
    const canvas = document.getElementById('island-canvas');
    canvas.innerHTML = '';
    canvas.classList.toggle('editing', editing);
    for (let i = 0; i < decorations.length; i++) {
        const d = decorations[i];
        const node = el('div', { class: 'deco' + (editing ? ' removable' : '') }, d.emoji);
        node.style.left = (d.px * 100) + '%';
        node.style.top = (d.py * 100) + '%';
        if (editing) makeDraggable(node, i);
        canvas.appendChild(node);
    }
}

function makeDraggable(node, index) {
    let startX, startY, origPx, origPy, moved = false;
    const canvas = document.getElementById('island-canvas');
    node.addEventListener('mousedown', startDrag);
    node.addEventListener('touchstart', startDrag, { passive: false });

    function startDrag(e) {
        e.preventDefault();
        moved = false;
        const p = getPoint(e);
        startX = p.x; startY = p.y;
        origPx = decorations[index].px;
        origPy = decorations[index].py;
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
    }
    function drag(e) {
        e.preventDefault();
        const p = getPoint(e);
        const r = canvas.getBoundingClientRect();
        const dx = (p.x - startX) / r.width;
        const dy = (p.y - startY) / r.height;
        if (Math.abs(dx) > 0.005 || Math.abs(dy) > 0.005) moved =true;
        decorations[index].px = Math.max(0, Math.min(1, origPx + dx));
        decorations[index].py = Math.max(0, Math.min(1, origPy + dy));
        node.style.left = (decorations[index].px * 100) + '%';
        node.style.top = (decorations[index].py * 100) + '%';
    }
    function endDrag(e) {
        document.removeEventListener('mousemove', drag);
        document.removeEventListener('touchmove', drag);
        document.removeEventListener('mouseup', endDrag);
        document.removeEventListener('touchend', endDrag);
        if (!moved) {
            decorations.splice(index, 1);
            renderDecorations();
        }
    }
    function getPoint(e) {
        if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        if (e.changedTouches && e.changedTouches[0]) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
        return { x: e.clientX, y: e.clientY };
    }
}

function renderActions() {
    const wrap = document.getElementById('island-actions');
    wrap.innerHTML = '';
    if (!isOwner) return;

    if (!editing) {
        wrap.appendChild(el('button', { class: 'btn primary', onClick: enterEdit}, '✏️ Editează'));
        wrap.appendChild(el('button', { class: 'btn ghost', onClick:renameIsland}, '📝 Redenumește'));
    } else {
        wrap.appendChild(el('button', { class: 'btn primary', onClick: saveEdit }, '💾 Salvează'));
        wrap.appendChild(el('button', { class: 'btn ghost', onClick: cancelEdit }, 'Anulează'));
    }
    document.getElementById('palette').style.display = editing ? 'flex' : 'none';
    if (editing) renderPalette();
}

function renderPalette() {
    const p = document.getElementById('palette');
    p.innerHTML = '';
    for (const emoji of PALETTE) {
        p.appendChild(el('button', {
            onClick: () => addDecoration(emoji)
        }, emoji));
    }
}

function addDecoration(emoji) {
    decorations.push({ emoji, px: 0.5, py: 0.5, scale: 1 });
    renderDecorations();
}

function enterEdit() {
    editing = true;
    render();
}

function cancelEdit() {
    editing = false;
    decorations = [...island.decorations];
    render();
}

async function saveEdit() {
    try {
        await Store.saveDecorations(island.id, decorations);
        island.decorations = [...decorations];
        editing = false;
        render();
    } catch (e) { alert(e.message); }
}

async function renameIsland() {
    const name = prompt('Nume nou pentru insulă:', island.name);
    if (!name || name === island.name) return;
    try {
        await Store.setIslandName(island.id, name);
        island.name = name.slice(0, 40);
        render();
    } catch (e) { alert(e.message); }
}

async function onHeart() {
    if (!profile) { window.IslaApp.showLoginModal(); return; }
    try {
        const liked = await Store.toggleHeart(island.id);
        island.liked_by_me = liked;
        island.hearts_count += liked ? 1: -1;
        render();
    } catch (e) { alert(e.message); }
}

function renderHint() {
    const h = document.getElementById('island-hint');
    if (editing) h.textContent = '✏️ Click pe paletă ca să adaugi. Trage cu mouse-ul ca să muți. Click pe decorațiune ca să o ștergi.';
    else if (isOwner) h.textContent = '👋 Asta e insula ta. Apasă „Editează" ca să o decorezi.';
    else h.textContent = '💝 Dă o inimă dacă îți place. Înapoi la ocean ca să găsești altele.';
}

init();
</script>

</body>
</html>
