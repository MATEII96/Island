<!DOCTYPE html>
<html land="en">
<head>
<meta charset = "UTF-8">
<meta name="viewport" content="widht=device-width, initial-scale=1.0">
<title>isla.fun - your tiny ocean island</title>
<style>
:root {
    --ocean-1: #5390d9; --ocean-2: #4ea8de; --ocean-3: #80c8e8;
    --foam: #e0fbfc; --sand-1: #fec89a; --sand-2: #f4d35e;
    --pink: #ff8fab; --mint: #06d6a0; --ink: #1d3557; --paper: #fffaf0;
    --golf: #ffd166;
    --shadow: 0 4px 14px rgba(29,53,87,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, var(--ocean-3) 0%, var(--ocean-1) 100%);
    min-height: 100vh; color: var(--ink); overflow-x: hidden;
}
header{
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; background: rgba(255,255,255,0.85);
    box-shadow: var(--shadow);
}
.logo { font-size: 22px; font-weight: 700; cursor: pointer; user-select: none;}
.demo-badge {
    background: var(--gold); color: #5a3e00;
    font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 600;
}
.admin-badge{
    background: var(--mint); color: white;
    font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 700;
}
</style>
</head>
<body>

<header>
    <div class="logo" id="logo">🏝️ isla.fun <span class="demo-badge">DEMO</span>/div>
    <div class="header-right" id="header-right"></div>
</header>

<div id="error-box" style="display:none"></div>

<main id="main"></main>

<script>





</script>

</body>
</html>
